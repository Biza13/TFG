apiVersion: cert-manager.io/v1
# Esto es para que el cert-manager pueda solicitar certificados ssl a letsEncrypt usando mi email
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: begonyaduck@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          ingress:
            class: nginx
